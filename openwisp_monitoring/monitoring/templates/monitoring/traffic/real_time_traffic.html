<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

{% if device_data.realtimemonitor.real_time_traffic.data.talkers %}
{{ device_data.realtimemonitor.real_time_traffic.data.talkers|json_script:"rtt-data" }}
{% else %}
<script type="application/json" id="rtt-data">{}</script>
{% endif %}

<style>
  /* ===== Real-Time Talkers (rtt-) ===== */
  .rtt-wrap{margin:16px auto;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#2b2f38}
  .rtt-wrap *{box-sizing:border-box}

  .rtt-row{display:grid;gap:18px}
  .rtt-row.two{grid-template-columns:1fr 1fr}
  .rtt-row.one{grid-template-columns:1fr}
  @media (max-width:1100px){.rtt-row.two{grid-template-columns:1fr}}

  .rtt-card{
    position:relative;overflow:hidden;
    background:#fff;border-radius:14px;border:1px solid #e5e7eb;
    box-shadow:0 6px 20px rgba(22,34,51,.08)
  }
  .rtt-header{background:#f0f0f0;padding:10px 12px;font-weight:700;color:#1f2937;border-bottom:1px solid #eee;font-size:14px}
  .rtt-card-pad{padding:16px}

  .rtt-donut-shell{height:220px;display:flex;align-items:center;justify-content:center}
  .rtt-donut{width:180px !important;height:180px !important;display:block !important}
  .rtt-wrap canvas{position:static !important;display:block !important;max-width:100%;height:auto}

  /* Stacked body: donut -> legend -> filter -> table -> pagination */
  .rtt-vert{display:flex;flex-direction:column;gap:8px;min-height:420px}

  .rtt-legend{display:flex;flex-wrap:wrap;gap:8px;padding:0 2px}
  .rtt-legend-item{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:#334155;background:#f8fafc;border:1px solid #e5e7eb;padding:6px 8px;border-radius:10px}
  .rtt-swatch{width:10px;height:10px;border-radius:50%;display:inline-block}

  .rtt-filter input{
  width:100%;
  padding:9px 10px;
  border:1px solid #e5e7eb;
  border-radius:10px;
  font-size:12px;
  background:#fff;
  outline:none;
}

/* Table area grows & scrolls so pager stays pinned */
.rtt-table-wrap{
  flex:1 1 auto;
  min-height:120px;
  overflow:auto;
}

/* Table alignment fix for RTT table */
.rtt-table{
  width:100%;
  border-collapse:separate;
  border-spacing:0 8px;
  font-size:13px;
  table-layout:fixed; /* ensures column widths match between header/body */
}

/* Header cells */
.rtt-table thead th{
  text-align:left;
  font-weight:700;
  color:#475569;
  font-size:12px;
  padding:10px 8px;       /* match tbody padding for perfect alignment */
  vertical-align:middle;
}

.rtt-table thead th:first-child{
  border-left:1px solid #e5e7eb;
}
.rtt-table thead th:last-child{
  text-align:right;
  border-right:1px solid #e5e7eb;
}

/* Body cells */
.rtt-table tbody td{
  padding:10px 8px;
  border-top:1px solid #e5e7eb;
  border-bottom:1px solid #e5e7eb;
  vertical-align:middle;
}
.rtt-table tbody tr td:first-child{
  border-left:1px solid #e5e7eb;
}
.rtt-table tbody tr td:last-child{
  border-right:1px solid #e5e7eb;
  text-align:right;
  color:#111827;
  font-weight:600;
}

/* Hover and pointer UX */
.rtt-table tbody tr{cursor:pointer}
.rtt-table tbody tr:hover{background:#f8fafc}

  .rtt-note{color:#6b7280;font-size:12px}

  /* Pagination pinned at the bottom of the card body */
  .rtt-pager{
    margin-top:auto;position:sticky;bottom:0;z-index:1;
    display:flex;justify-content:space-between;align-items:center;
    padding:8px;font-size:12px;color:#475569;border-top:1px solid #e5e7eb;
    border-bottom-left-radius:14px;border-bottom-right-radius:14px
  }
  .rtt-pager-info{color:#64748b}
  .rtt-pager-ctrls{display:flex;align-items:center;gap:6px}
  .rtt-pager select{border:1px solid #e5e7eb;border-radius:6px;padding:3px 6px;font-size:12px;color:#334155;background:#fff;outline:none}
  .rtt-pager button{border:1px solid #e5e7eb;border-radius:6px;background:#f3f4f6;color:#64748b;font-size:12px;padding:3px 8px;cursor:pointer;transition:.2s}
  .rtt-pager button:hover:not(:disabled){background:#e5e7eb}
  .rtt-pager button:disabled{opacity:.5;cursor:default}
</style>

<div class="rtt-wrap">
<style>
.tf-date-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 16px;padding:12px 16px;background:#fff;border:1px solid #e5e7eb;border-radius:14px;box-shadow:0 2px 8px rgba(22,34,51,.05)}
.tf-date-bar label{font-weight:600;color:#334155;font-size:13px;white-space:nowrap}
.tf-date-bar input[type=date]{border:1px solid #e5e7eb;border-radius:8px;padding:7px 12px;font-size:13px;background:#f8fafc;color:#334155;outline:none}
.tf-date-bar input[type=date]:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.tf-date-bar .tf-btn{display:inline-flex;align-items:center;gap:4px;padding:7px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.tf-date-bar .tf-apply{background:#3b82f6;color:#fff}.tf-date-bar .tf-apply:hover{background:#2563eb}
.tf-date-bar .tf-reset{background:#f1f5f9;color:#64748b;border:1px solid #e5e7eb}.tf-date-bar .tf-reset:hover{background:#e2e8f0}
.tf-date-bar .tf-quick{display:flex;gap:4px;margin-left:8px}
.tf-date-bar .tf-qb{padding:5px 10px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:#475569}
.tf-date-bar .tf-qb:hover,.tf-date-bar .tf-qb.active{background:#eef2ff;border-color:#3b82f6;color:#3b82f6;font-weight:600}
.tf-date-bar .tf-status{font-size:12px;color:#64748b;margin-left:auto}.tf-date-bar .tf-status strong{color:#334155}
</style>
<div class="tf-date-bar" id="rdf-bar">
  <label>From:</label><input type="date" id="rdf-from">
  <label>To:</label><input type="date" id="rdf-to">
  <button type="button" class="tf-btn tf-apply" id="rdf-apply">Apply</button>
  <button type="button" class="tf-btn tf-reset" id="rdf-reset">Reset</button>
  <div class="tf-quick">
    <button type="button" class="tf-qb active" data-range="today">Today</button>
    <button type="button" class="tf-qb" data-range="yesterday">Yesterday</button>
    <button type="button" class="tf-qb" data-range="7d">Last 7 Days</button>
    <button type="button" class="tf-qb" data-range="30d">Last 30 Days</button>
  </div>
  <span class="tf-status" id="rdf-status">Showing: <strong>Today</strong></span>
</div>


  <!-- Row 1: Applications + Protocols -->
  <div class="rtt-row two">
    <!-- Top Applications -->
    <div class="rtt-card">
      <div class="rtt-header">Top Applications</div>
      <div class="rtt-card-pad rtt-vert">
        <div class="rtt-donut-shell"><canvas id="rtt-donut-apps" class="rtt-donut"></canvas></div>
        <div class="rtt-legend" id="rtt-legend-apps"></div>
        <div class="rtt-filter"><input id="rtt-filter-apps" placeholder="Filter…"></div>
        <div class="rtt-table-wrap">
          <table class="rtt-table" id="rtt-table-apps">
            <thead><tr><th>Application</th><th>Traffic</th></tr></thead><tbody></tbody>
          </table>
        </div>
        <div class="rtt-note" id="rtt-note-apps"></div>
        <div class="rtt-pager" id="rtt-pager-apps"></div>
      </div>
    </div>

    <!-- Top Protocols -->
    <div class="rtt-card">
      <div class="rtt-header">Top Protocols</div>
      <div class="rtt-card-pad rtt-vert">
        <div class="rtt-donut-shell"><canvas id="rtt-donut-protos" class="rtt-donut"></canvas></div>
        <div class="rtt-legend" id="rtt-legend-protos"></div>
        <div class="rtt-filter"><input id="rtt-filter-protos" placeholder="Filter…"></div>
        <div class="rtt-table-wrap">
          <table class="rtt-table" id="rtt-table-protos">
            <thead><tr><th>Protocol</th><th>Traffic</th></tr></thead><tbody></tbody>
          </table>
        </div>
        <div class="rtt-note" id="rtt-note-protos"></div>
        <div class="rtt-pager" id="rtt-pager-protos"></div>
      </div>
    </div>
  </div>

  <!-- Row 2: Hosts -->
  <div class="rtt-row two" style="margin-top:18px;">
    <div class="rtt-card">
      <div class="rtt-header">Top Hosts</div>
      <div class="rtt-card-pad rtt-vert">
        <div class="rtt-donut-shell"><canvas id="rtt-donut-hosts" class="rtt-donut"></canvas></div>
        <div class="rtt-legend" id="rtt-legend-hosts"></div>
        <div class="rtt-filter"><input id="rtt-filter-hosts" placeholder="Filter…"></div>
        <div class="rtt-table-wrap">
          <table class="rtt-table" id="rtt-table-hosts">
            <thead><tr><th>Host / IP</th><th>Traffic</th></tr></thead><tbody></tbody>
          </table>
        </div>
        <div class="rtt-note" id="rtt-note-hosts"></div>
        <div class="rtt-pager" id="rtt-pager-hosts"></div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  /* ---------- Read data ---------- */
  const talkers = JSON.parse(document.getElementById('rtt-data').textContent || '{}');
  const topApps   = Array.isArray(talkers.top_apps) ? talkers.top_apps : [];
  const topProtos = Array.isArray(talkers.top_protocols) ? talkers.top_protocols : [];
  const topHosts  = Array.isArray(talkers.top_hosts) ? talkers.top_hosts : [];

  /* ---------- Utils ---------- */
  const rttColors = ["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#22c55e","#0ea5e9","#a78bfa","#f97316","#14b8a6","#eab308","#f43f5e"];

  function fmtBytes(bytes){
    const b = Number(bytes)||0;
    if(b>=1024**3) return (b/1024**3).toFixed(2)+' GB';
    if(b>=1024**2) return (b/1024**2).toFixed(2)+' MB';
    if(b>=1024)    return (b/1024).toFixed(2)+' KB';
    return b.toFixed(2)+' B';
  }

  // Strip first two dot segments: "10669.netify.snort" -> "snort"
  function trimTwoDots(name){
    if(typeof name !== 'string') return name ?? '';
    const parts = name.split('.');
    return parts.length >= 3 ? parts.slice(2).join('.') : name;
  }

  const sum = (arr, fn) => arr.reduce((a,x)=> a + (Number(fn(x))||0), 0);

  /* ---------- Donut builder ---------- */
  function buildDonut({canvas,items,labelFn,valueFn,legendEl,noteEl,topN=6}){
    const sorted = [...items].sort((a,b)=> valueFn(b)-valueFn(a));
    const head   = sorted.slice(0, topN);
    const tail   = sorted.slice(topN);
    const othersVal = sum(tail, valueFn);
    if(othersVal > 0) head.push({__name: "Other", __value: othersVal});

    const labels = head.map(it => it.__name ?? labelFn(it));
    const values = head.map(it => it.__value ?? valueFn(it));
    const total  = values.reduce((a,b)=>a+b,0) || 1;

    new Chart(canvas, {
      type:'doughnut',
      data:{ labels, datasets:[{ data: values, backgroundColor: labels.map((_,i)=>rttColors[i%rttColors.length]), borderWidth:0 }] },
      options:{
        responsive:false, maintainAspectRatio:false, cutout:"65%",
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{ label:(ctx)=>{
            const v = ctx.parsed || 0;
            const pct = (v/total*100).toFixed(1);
            return `${ctx.label}: ${fmtBytes(v)} (${pct}%)`;
          }}}
        }
      }
    });

    legendEl.innerHTML = "";
    labels.forEach((name,i)=>{
      const d = document.createElement('div');
      d.className = 'rtt-legend-item';
      d.innerHTML = `<span class="rtt-swatch" style="background:${rttColors[i%rttColors.length]}"></span>${name}`;
      legendEl.appendChild(d);
    });

    if(noteEl) noteEl.textContent = `Total: ${fmtBytes(total)} • ${labels.length - (othersVal>0?1:0)} top items${othersVal>0?' (+ Other)':''}`;
  }

  /* ---------- Table + Pagination (filter-aware) ---------- */
  function makePager({rootId,rows,nameFn,valueFn,tableBodySel,filterInputSel,perPage=8}){
    const pagerEl     = document.getElementById(rootId);
    const tbody       = document.querySelector(tableBodySel);
    const filterInput = document.querySelector(filterInputSel);

    let state = { all: rows, filtered: rows, page: 1, perPage };

    const pageCount = () => Math.max(1, Math.ceil(state.filtered.length / state.perPage));
    const clamp     = () => { state.page = Math.min(Math.max(1, state.page), pageCount()); };

    function renderTable(){
      clamp();
      const start = (state.page-1)*state.perPage;
      const slice = state.filtered.slice(start, start+state.perPage);
      tbody.innerHTML = "";
      slice.forEach(r=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${nameFn(r)}</td><td>${fmtBytes(valueFn(r))}</td>`;
        tbody.appendChild(tr);
      });
    }

    function renderPager(){
      const total = state.filtered.length;
      const pc    = pageCount();
      pagerEl.innerHTML = `
        <span class="rtt-pager-info">Page ${state.page} of ${pc} — ${total} ${total===1?'row':'rows'}</span>
        <div class="rtt-pager-ctrls">
          <select id="${rootId}-rpp">
            <option ${state.perPage===6?'selected':''}>6</option>
            <option ${state.perPage===12?'selected':''}>12</option>
            <option ${state.perPage===18?'selected':''}>18</option>
          </select>
          <button id="${rootId}-prev" ${state.page<=1?'disabled':''}>Prev</button>
          <button id="${rootId}-next" ${state.page>=pc?'disabled':''}>Next</button>
        </div>
      `;
      pagerEl.querySelector(`#${rootId}-rpp`).onchange = (e)=>{
        state.perPage = parseInt(e.target.value,10) || 8;
        state.page = 1; renderTable(); renderPager();
      };
      pagerEl.querySelector(`#${rootId}-prev`).onclick = ()=>{
        if(state.page>1){ state.page--; renderTable(); renderPager(); }
      };
      pagerEl.querySelector(`#${rootId}-next`).onclick = ()=>{
        if(state.page<pc){ state.page++; renderTable(); renderPager(); }
      };
    }

    function applyFilter(){
      const q = (filterInput?.value || "").trim().toLowerCase();
      state.filtered = q
        ? state.all.filter(r => nameFn(r).toLowerCase().includes(q))
        : state.all;
      state.page = 1; renderTable(); renderPager();
    }

    applyFilter();
    if(filterInput) filterInput.addEventListener('input', applyFilter);
  }

  /* ---------- Build donuts ---------- */
  buildDonut({
    canvas: document.getElementById('rtt-donut-apps'),
    items: topApps,
    labelFn: (x)=> trimTwoDots(x.name ?? '—'),
    valueFn: (x)=> Number(x.value || 0),  // bytes
    legendEl: document.getElementById('rtt-legend-apps'),
    noteEl: document.getElementById('rtt-note-apps'),
    topN: 6
  });

  buildDonut({
    canvas: document.getElementById('rtt-donut-protos'),
    items: topProtos,
    labelFn: (x)=> trimTwoDots(x.name ?? '—'),
    valueFn: (x)=> Number(x.value || 0),  // bytes
    legendEl: document.getElementById('rtt-legend-protos'),
    noteEl: document.getElementById('rtt-note-protos'),
    topN: 6
  });

  buildDonut({
    canvas: document.getElementById('rtt-donut-hosts'),
    items: topHosts,
    labelFn: (h)=> (h.host || h.ip || '—'),
    valueFn: (h)=> Number(h?.totals?.bandwidth || 0),  // bytes
    legendEl: document.getElementById('rtt-legend-hosts'),
    noteEl: document.getElementById('rtt-note-hosts'),
    topN: 6
  });

  /* ---------- Tables + Pagination ---------- */
  makePager({
    rootId: 'rtt-pager-apps',
    rows: [...topApps].sort((a,b)=>(b.value||0)-(a.value||0)),
    nameFn: (r)=> trimTwoDots(r.name || '—'),
    valueFn: (r)=> r.value || 0,
    tableBodySel: '#rtt-table-apps tbody',
    filterInputSel: '#rtt-filter-apps',
    perPage: 6
  });

  makePager({
    rootId: 'rtt-pager-protos',
    rows: [...topProtos].sort((a,b)=>(b.value||0)-(a.value||0)),
    nameFn: (r)=> trimTwoDots(r.name || '—'),
    valueFn: (r)=> r.value || 0,
    tableBodySel: '#rtt-table-protos tbody',
    filterInputSel: '#rtt-filter-protos',
    perPage: 6
  });

  makePager({
    rootId: 'rtt-pager-hosts',
    rows: [...topHosts].sort((a,b)=>( (b?.totals?.bandwidth||0) - (a?.totals?.bandwidth||0) )),
    nameFn: (r)=> (r.host || r.ip || '—'),
    valueFn: (r)=> (r?.totals?.bandwidth || 0),
    tableBodySel: '#rtt-table-hosts tbody',
    filterInputSel: '#rtt-filter-hosts',
    perPage: 6
  });


  /* ===== DATE FILTER ===== */
  function replaceCanvas(id){var old=document.getElementById(id);if(!old)return null;var inst=Chart.getChart(old);if(inst)inst.destroy();var nw=document.createElement('canvas');nw.id=id;if(old.className)nw.className=old.className;if(old.style.cssText)nw.style.cssText=old.style.cssText;old.parentNode.replaceChild(nw,old);return nw;}
  function _ld(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  var _origTalkers = JSON.parse(JSON.stringify(talkers));

  function _rttRender(data){
    document.querySelectorAll('.rtt-wrap canvas').forEach(function(cv){var ch=Chart.getChart(cv);if(ch)ch.destroy();});
    var ta2=Array.isArray(data.top_apps)?data.top_apps:[];
    var tp2=Array.isArray(data.top_protocols)?data.top_protocols:[];
    var th2=Array.isArray(data.top_hosts)?data.top_hosts:[];
    function bld(cv,it,lf,vf,lg,nt){if(cv&&it.length)buildDonut({canvas:cv,items:it,labelFn:lf,valueFn:vf,legendEl:lg,noteEl:nt,topN:6});else if(lg)lg.innerHTML='<span style="color:#9ca3af;font-size:13px">No data for selected period</span>';}
    bld(replaceCanvas('rtt-donut-apps'),ta2,function(x){return trimTwoDots(x.name||'');},function(x){return Number(x.value||0);},document.getElementById('rtt-legend-apps'),document.getElementById('rtt-note-apps'));
    bld(replaceCanvas('rtt-donut-protos'),tp2,function(x){return trimTwoDots(x.name||'');},function(x){return Number(x.value||0);},document.getElementById('rtt-legend-protos'),document.getElementById('rtt-note-protos'));
    bld(replaceCanvas('rtt-donut-hosts'),th2,function(x){return x.host||x.ip||'';},function(x){return Number(x&&x.totals&&x.totals.bandwidth||0);},document.getElementById('rtt-legend-hosts'),document.getElementById('rtt-note-hosts'));
    function rT(sel,items,nf,vf){var tb=document.querySelector(sel);if(!tb)return;tb.innerHTML='';if(!items.length){tb.innerHTML='<tr><td colspan=2 style="text-align:center;color:#9ca3af;padding:20px">No data</td></tr>';return;}items.sort(function(a,b){return vf(b)-vf(a);}).slice(0,10).forEach(function(r){var tr=document.createElement('tr');tr.innerHTML='<td>'+nf(r)+'</td><td>'+fmtBytes(vf(r))+'</td>';tb.appendChild(tr);});}
    rT('#rtt-table-apps tbody',ta2,function(r){return trimTwoDots(r.name||'');},function(r){return r.value||0;});
    rT('#rtt-table-protos tbody',tp2,function(r){return trimTwoDots(r.name||'');},function(r){return r.value||0;});
    rT('#rtt-table-hosts tbody',th2,function(r){return r.host||r.ip||'';},function(r){return r&&r.totals&&r.totals.bandwidth||0;});
  }

  (function(){
    var bar=document.getElementById('rdf-bar');if(!bar)return;
    var dfF=document.getElementById('rdf-from'),dfT=document.getElementById('rdf-to');
    var stEl=document.getElementById('rdf-status');
    var qbs=bar.querySelectorAll('.tf-qb');
    var today=_ld(new Date());
    dfF.value=today;dfT.value=today;dfF.max=today;dfT.max=today;
    function setQ(r){qbs.forEach(function(b){b.classList.toggle('active',b.dataset.range===r);});}
    function gR(r){var n=new Date(),t=new Date(n),f=new Date(n);f.setHours(0,0,0,0);t.setHours(23,59,59,999);if(r==='yesterday'){f.setDate(f.getDate()-1);t.setDate(t.getDate()-1);}else if(r==='7d'){f.setDate(f.getDate()-6);}else if(r==='30d'){f.setDate(f.getDate()-29);}return{from:_ld(f),to:_ld(t)};}
    function uS(f,t){if(f===t){var d=new Date(f+'T12:00:00');stEl.innerHTML='Showing: <strong>'+d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})+'</strong>';}else{stEl.innerHTML='Showing: <strong>'+new Date(f+'T12:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' - '+new Date(t+'T12:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})+'</strong>';}}
    function go(){
      var f=dfF.value,t=dfT.value;if(!f||!t)return;if(f>t){alert('From must be before To');return;}
      uS(f,t);
      if(f===today&&t===today){_rttRender(_origTalkers);return;}
      var m=window.location.pathname.match(/[0-9a-fA-F-]{36}/);if(!m)return;
      fetch('/ow-ajax/rt-traffic/'+m[0]+'/?from='+f+'&to='+t)
        .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
        .then(function(data){_rttRender(data);})
        .catch(function(e){console.error('Filter error:',e);});
    }
    qbs.forEach(function(btn){btn.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();var d=gR(btn.dataset.range);dfF.value=d.from;dfT.value=d.to;setQ(btn.dataset.range);go();});});
    document.getElementById('rdf-apply').addEventListener('click',function(e){e.preventDefault();e.stopPropagation();setQ('');go();});
    document.getElementById('rdf-reset').addEventListener('click',function(e){e.preventDefault();e.stopPropagation();dfF.value=today;dfT.value=today;setQ('today');stEl.innerHTML='Showing: <strong>Today</strong>';_rttRender(_origTalkers);});
  })();

})();
</script>
